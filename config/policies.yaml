# tac-master: Execution Policies
#
# Copy to config/policies.yaml and customize.
# Policies define WHAT the orchestrator is allowed to do in a given repo.
# They are enforced at dispatch time, BEFORE any agent is spawned.

version: 1

# Global safety policies (always enforced, not overridable by repo config)
safety:
  # Never push to these branches directly. Always go via PR.
  protected_branches:
    - main
    - master
    - production
    - release

  # Forbidden file patterns — ADWs will not touch these in any repo.
  forbidden_paths:
    - "**/.env"
    - "**/.env.*"
    - "**/secrets/**"
    - "**/*.pem"
    - "**/*.key"
    - "**/credentials.json"

  # Max files modified per PR. Issues requiring more are rejected with a comment
  # asking the human to decompose the work.
  max_files_per_pr: 50

  # Max diff size (lines added+removed) per PR.
  max_diff_lines_per_pr: 2000

  # Require all tests to pass before a Worker can progress past the test phase.
  require_tests_pass: true

# Per-workflow permissions
workflows:
  sdlc_zte:
    # Zero Touch Engineering is gated to repos where auto_merge: true
    requires: [auto_merge]
    # Max runs per day per repo (extra cap beyond budgets.yaml)
    max_per_repo_per_day: 10

  sdlc:
    requires: []
    max_per_repo_per_day: 20

  plan_build:
    requires: []
    max_per_repo_per_day: 50

  patch:
    requires: []
    max_per_repo_per_day: 100
    # Patch workflow is limited in blast radius
    max_files_override: 3
    max_diff_lines_override: 200

# Self-improvement policy — ONLY applies to repos marked self: true
self_improvement:
  # Per user policy: full autonomy including auto-merge on self.
  allow_auto_merge: true
  # But still require test pass — a broken tac-master is catastrophic
  require_tests_pass: true
  # Rollback gate: after merge, if health_check fails within N minutes, revert
  post_merge_health_check:
    enabled: true
    timeout_minutes: 10
    revert_on_failure: true
