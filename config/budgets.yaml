# tac-master: Cost Controls
#
# Copy to config/budgets.yaml and customize.
# Budgets are enforced before dispatching a new Lead. An active run that blows
# its budget mid-flight is allowed to finish its current phase but no new
# phases are spawned. The circuit breaker trips per-repo and globally.

version: 1

# Global ceiling across all repos per 24h rolling window.
global:
  max_tokens_per_day: 10000000       # 10M tokens/day hard cap
  max_runs_per_day: 100              # max Leads spawned per day
  max_concurrent_runs: 15            # tac-7 port allocation ceiling
  on_exceeded: halt                  # halt | warn | throttle

# Per-repo defaults (override inline under `repos:`).
defaults:
  max_tokens_per_day: 2000000
  max_runs_per_day: 20
  max_concurrent_runs: 5
  # Max cost per single ADW run before it's force-killed
  max_tokens_per_run: 500000

# Per-repo overrides
repos:
  - url: https://github.com/OWNER/tac-master
    max_tokens_per_day: 5000000
    max_runs_per_day: 30
    # Self-improvement is high-value; allow larger runs
    max_tokens_per_run: 1000000

  # - url: https://github.com/OWNER/example-project
  #   max_tokens_per_day: 1000000
  #   max_runs_per_day: 10

# Notifications when thresholds are crossed
alerts:
  # Emit a warning event (visible in dashboard) when usage crosses this %
  warn_at_pct: 75
  # Halt when crossed — sent as a GitHub issue on tac-master's own repo
  halt_notify_issue: true
