# Model pricing for token accounting.
#
# Prices are USD per 1M tokens. Update when Anthropic changes pricing.
# Source: https://docs.claude.com/en/docs/about-claude/models/overview
# (Last updated: 2026-04; check before relying on these in production.)
#
# tac-master parses Claude Code JSONL output per phase and multiplies
# token counts by the appropriate row here. Missing models fall back to
# "default".

version: 1

prices:
  # Claude 4.6 family
  claude-opus-4-6:
    input: 15.00
    output: 75.00
    cache_write: 18.75    # 5m ephemeral cache creation
    cache_read: 1.50

  claude-sonnet-4-6:
    input: 3.00
    output: 15.00
    cache_write: 3.75
    cache_read: 0.30

  claude-haiku-4-5:
    input: 1.00
    output: 5.00
    cache_write: 1.25
    cache_read: 0.10

  # Legacy aliases used by tac-7 ADWs
  sonnet:
    input: 3.00
    output: 15.00
    cache_write: 3.75
    cache_read: 0.30

  opus:
    input: 15.00
    output: 75.00
    cache_write: 18.75
    cache_read: 1.50

  haiku:
    input: 1.00
    output: 5.00
    cache_write: 1.25
    cache_read: 0.10

  # Fallback for unknown models (conservative — price as Opus)
  default:
    input: 15.00
    output: 75.00
    cache_write: 18.75
    cache_read: 1.50
